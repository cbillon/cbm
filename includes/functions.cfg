function update_moodle () {
Start
# Initialisation signal erreur
error=0
#exec 1> >(logger -s -t $(basename $0)) 2>&1
[ -f "$PROJECTS_PATH"/"$1"/"$1".yml ]
PROJECT="$1"

get_requested_state $PROJECT 
local old_state
#old_state=$(git merge-base "$MOODLE_BRANCH" "$PROJECT_BRANCH")
old_state="$CURRENT_STATE"
[ "$DEBUG" = true ] && info old_state "$old_state"
# old_state est le commit de dûˋpart de la branche projet
# etat de Moodle change si :
#  Moodle a changûˋ et MOODLE VERSION a changûˋ
#  Moodle Version a ûˋtûˋ modifiûˋ dans le fichier de configuration

# update MOODLE


info "Mise û  jour $MOODLE_BRANCH depuis upstream"
cd "$MOODLE_SRC"
git fetch upstream "$MOODLE_BRANCH" --tags --quiet

info "Fetch upstream $MOODLE_BRANCH effectuûˋe"
remote_branch=$(git log -n 1 --pretty=format:"%H" upstream/"$MOODLE_BRANCH")
local_branch=$(git log -n 1 --pretty=format:"%H" "$MOODLE_BRANCH")
[ "$DEBUG" = true ] && info remote_branch "$remote_branch"
[ "$DEBUG" = true ] && info local_branch "$local_branch"
if [[ "$remote_branch" !=  "$local_branch" ]]; then
  git checkout "$MOODLE_BRANCH" --quiet
  git merge --ff-only  upstream/"$MOODLE_BRANCH" --quiet
  info Mise jour "$MOODLE_BRANCH" local depuis upstream/"$MOODLE_BRANCH" effectuûˋe.
fi

get_requested_state "$PROJECT" 

#[ "$DEBUG" = true ] && [ -z "$MOODLE_UPDATE_ORIGIN" ] && echo "  MOODLE_UPDATE_ORIGIN:  $MOODLE_UPDATE_ORIGIN"
# valeur MOODLE_UPDATE_ORIGIN definie dans <nom du PROJECT>.yml

cd "$MOODLE_SRC"
# to force update project set old_state=''
if [[ "$old_state" != "$CURRENT_STATE" ]]; then
  # update project
  git checkout "$PROJECT_BRANCH" --quiet
  git merge "$MOODLE_BRANCH"
  success "$PROJECT_BRANCH" merged after Moodle update
else
  info No change on project Moodle version
fi

git checkout "$PROJECT_BRANCH" --quiet

info End

}

