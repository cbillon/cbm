      #git fetch upstream "$MOODLE_BRANCH" --tags --quiet || check_command "error git fetch upstream $MOODLE_BRANCH --tags --quiet"
    else
      echo code to be supplied
    fi
  else
    info "$MOODLE_SRC" does not exists

    git clone --branch "$MOODLE_BRANCH" "$DEPOT_ORIGIN"  "$MOODLE_SRC" || check_command "error git clone --branch $MOODLE_BRANCH $DEPOT_ORIGIN  $MOODLE_SRC"

    cd "$MOODLE_SRC" || exit 1
    git remote add upstream "$MOODLE_HQ" || check_command error git remote add origin "$MOODLE_HQ"
    # if [ $DEPOT_ORIGIN == $MOODLE_HQ ]; then
    #   info rename upstream $MOODLE_SRC
    #   git remote rename origin upstream
    #   [ $? -ne 0 ] && error=1 &&  error git remote rename origin upstream && exit 1
    # else
    #   git remote add upstream "$MOODLE_HQ" || check_command error git remote add origin "$MOODLE_HQ"
    # fi
  fi

  #
  #PROJECT_BRANCH="$PROJECT"
  # création de la branch projet
  cd "$MOODLE_SRC" || exit 1
  #get_current_state "$PROJECT"

  if [[ "$(git branch)" =~ ^.*"$PROJECT_BRANCH" ]]; then
    git checkout "$PROJECT_BRANCH" --quiet || check_command "error git checkout $PROJECT_BRANCH"
  else
    info "Create Branch $PROJECT_BRANCH from $MOODLE_CURRENT"
    git branch "$PROJECT_BRANCH" "$MOODLE_CURRENT" || check_command "error git branch $PROJECT_BRANCH from $MOODLE_CURRENT"
  fi

  git checkout "$PROJECT_BRANCH" --quiet || check_command "error git checkout $PROJECT_BRANCH"

  info End

}

function update_moodle () {
info Start
# Initialisation signal erreur
error=0
#exec 1> >(logger -s -t $(basename $0)) 2>&1
PROJECT="$1"
[ -f "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml ] || exit 1
get_requested_state $PROJECT || exit 1
local old_state
#old_state=$(git merge-base "$MOODLE_BRANCH" "$PROJECT_BRANCH")
old_state="$CURRENT_STATE"
[ "$DEBUG" = true ] && info OLD_STATE "$OLD_STATE"
# old_state est le commit de départ de la branche projet
# etat de Moodle change si :
#  Moodle a changé et MOODLE VERSION a changé
#  Moodle Version a été modifié dans le fichier de configuration

# update MOODLE


info "Mise à jour $MOODLE_BRANCH depuis upstream"
cd "$MOODLE_SRC" || exit
git fetch upstream "$MOODLE_BRANCH" --tags --quiet || check_command error git fetch upstream "$MOODLE_BRANCH"

info "Fetch upstream $MOODLE_BRANCH effectuée"
remote_branch=$(git log -n 1 --pretty=format:"%H" upstream/"$MOODLE_BRANCH")
local_branch=$(git log -n 1 --pretty=format:"%H" "$MOODLE_BRANCH")
[ "$DEBUG" = true ] && info remote_branch "$remote_branch"
[ "$DEBUG" = true ] && info local_branch "$local_branch"
if [[ "$remote_branch" !=  "$local_branch" ]]; then
  git checkout "$MOODLE_BRANCH" --quiet || check_command "git checkout $MOODLE_BRANCH"
  git merge --ff-only  upstream/"$MOODLE_BRANCH" --quiet || check_command "git merge --ff-only  upstream/$MOODLE_BRANCH "
  info Mise jour "$MOODLE_BRANCH" local depuis upstream/"$MOODLE_BRANCH" effectuée.
fi

get_requested_state "$PROJECT" || exit 1

info MOODLE_CURRENT: "$MOODLE_CURRENT" after update

[ "$DEBUG" = true ] && echo "Parameters:"
[ "$DEBUG" = true ] && echo "  PROJECT: $PROJECT"
[ "$DEBUG" = true ] && echo "  MOODLE_VERSION: $MOODLE_VERSION"
[ "$DEBUG" = true ] && echo "  MOODLE_BRANCH: $MOODLE_BRANCH"
[ "$DEBUG" = true ] && echo "  CURRENT_STATE : $CURRENT_STATE"
[ "$DEBUG" = true ] && echo "  MOODLE_SRC: $MOODLE_SRC"
[ "$DEBUG" = true ] && echo "  PROJECT_BRANCH: $PROJECT_BRANCH"
[ "$DEBUG" = true ] && [ -z "$MOODLE_UPDATE_ORIGIN" ] && echo "  MOODLE_UPDATE_ORIGIN:  $MOODLE_UPDATE_ORIGIN"
# valeur MOODLE_UPDATE_ORIGIN definie dans <nom du PROJECT>.yml

cd "$MOODLE_SRC" || exit

if [[ "$old_state" != "$CURRENT_STATE" ]]; then
  git checkout "$PROJECT_BRANCH" --quiet || check_command error git checkout "$PROJECT_BRANCH"
  git merge "$MOODLE_CURRENT" || check_command error git merge "$MOODLE_CURRENT"
  success "$PROJECT_BRANCH" merged after Moodle update
else
  info No change on project Moodle version
fi

git checkout "$PROJECT_BRANCH" --quiet || check_command error git checkout "$PROJECT_BRANCH" --quiet

info End

}

function list_plugins_cache () {

  info Start
  error=0
  i=0
  list=''
  for d in $(ls -l "$DEPOT_MODULES" | awk '{print $9}' | sort); do
    i=$((i+1))
    list="$list $d $i OFF"
  done

  parm=$(whiptail --title "Plugins cache" --checklist "Plugin's List(cache)" 25 78 16 $list 3>&1 1>&2 2>&3)
  sortie=0
  info End
}

function get_plugin_dir () {
  # IN: $PLUGIN  type_component name
  # OUT: $DIR
  info Start
  error=0
  [ -z "$1" ] && error "$1" Parameter plugin missing && exit
  # le fichier components.json permet de determiner le repertoire de destination a partir du type de plugin
  # pour convertir au format yaml : yq -oy components.json > components.yml
  #https://blog.kiprosh.com/regular-expressions-greedy-vs-non-greedy/ type_stype_name
  # doesn t works wit bash !
  if [[ "$1" =~ ^([a-z].*?)_(.*)$ ]]; then
    ss=${1#*-}
    COMPONENT_NAME=${1#*_}
    TYPE=${ss%%_*}
    
    #TYPE="${BASH_REMATCH[1]}"
    DIR=$(jq -r .plugintypes."$TYPE" "$RACINE"/types.json)
    [ "$DIR" == null ] && error type: "$TYPE" invalide && error 1
    #COMPONENT_NAME="${BASH_REMATCH[2]}"
    PLUGIN="$TYPE"_"$COMPONENT_NAME"
  else
    error=1
    error Incorrect plugin syntax "$1"
  fi
  info End
  return "$error"
}

function add_plugin_cache () {

  info Start
  error=0
  #[ -z "$1" ]&& PLUGIN="$1" || PLUGIN="moodle-"
  parm=$(whiptail --inputbox "New plugin (type_name) ?" 8 39 "" --title "Add plugin" 3>&1 1>&2 2>&3)
  # A trick to swap stdout and stderr.
  # Again, you can pack this inside if, but it seems really long for some 80-col terminal users.
  exitstatus=$?

  if [ $exitstatus -ne 0 ]; then
    error "Select canceled."
    exit
  fi
  # en parametre le plugin recherché sous la forme <type>_<name>

  [ -z "$parm" ] && error "$parm" Parametre plugin missing && exit
  get_plugin_dir "$parm"
  [ "$DEBUG" = true ] && info plugin: "$PLUGIN" "$TYPE" "$COMPONENT_NAME"

  if [ -d "$DEPOT_MODULES"/"$PLUGIN" ]; then
    warn "$PLUGIN" already exists
  else

    # Recherche dans le fichier de référence des plugins

    jq -r --arg plugin  "$PLUGIN" '.plugins|map(select(.component == $plugin)) | .[]' "$SCRIPT_DIR"/pluglist.json > "$RACINE"/tmp.json
    var=$(jq '.id' "$RACINE"/tmp.json)
    [ "$DEBUG" = true ] && info "$var"
    if [ "$var" == '' ]; then
      warn "$component_name" not found in plugin directory
      SOURCE=$(whiptail --inputbox "Source du plugin?" 8 39 "https://github.com//$PLUGIN" --title "Project" 3>&1 1>&2 2>&3)
    # A trick to swap stdout and stderr.
    # Again, you can pack this inside if, but it seems really long for some 80-col terminal users.
      exitstatus=$?
      if [ $exitstatus -ne 0 ]; then
        error "Select canceled."
        exit 1
      fi
    else
      NAME=$(jq -r '.name' "$RACINE"/tmp.json)  # description
      SOURCE=$(jq -r '.source' "$RACINE"/tmp.json)
    fi
    # Add plugin
    info Plugin Source : "$SOURCE"
    # if [[ ! $SOURCE ]]; then
    #   error "$PLUGIN" non trouvé
    #   SOURCE=$(whiptail --inputbox "Source du plugin?" 8 39 "https://github.com//$PLUGIN" --title "Project" 3>&1 1>&2 2>&3)
    # # A trick to swap stdout and stderr.
    # # Again, you can pack this inside if, but it seems really long for some 80-col terminal users.
    #   exitstatus=$?
    #   if [ $exitstatus -ne 0 ]; then
    #     error "Select canceled."
    #     exit 1
    #   fi
    #   info Source du plugin "$PLUGIN":"$SOURCE"
    # fi

    cd "$DEPOT_MODULES" || exit
    git clone "$SOURCE" "$PLUGIN" --quiet || check_command error "$?" git clone "$SOURCE" "$PLUGIN"
    cd "$DEPOT_MODULES"/"$PLUGIN" || exit 1
    git remote rename origin upstream || check_command error git remote rename origin  upstream

  fi
success "$PLUGIN locally loaded in cache"
info End
}

function add_plugin_project () {
  info Start
  edit=0
  # cd "$MOODLE_SRC" || exit 1
  # git checkout "$PROJECT_BRANCH" --quiet || (error git checkout "$PROJECT_BRANCH" && exit 1)
  #local empty
  #empty=$(yq '.plugins' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  if [[ -n $(yq '.plugins' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml) ]];
  then
    PLUGINS=$(yq '.plugins| keys |.[]' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  else
    PLUGINS=''
  fi
  cd "$DEPOT_MODULES" || exit
  i=0
  list=''
  for d in $(ls -l "$DEPOT_MODULES" | awk '{print $9}'); do
    [[ "$PLUGINS" =~ .*"$d".* ]] && continue
    i=$((i+1))
    list="$list $d $i OFF"
  done

  PLUGINS=$(whiptail --title "Plugins cache" --checklist "Plugin's List" 25 78 16 $list 3>&1 1>&2 2>&3)
  exitstatus=$?

  if [ $exitstatus -ne 0 ]; then
    error "Select canceled."
    exit 1
  fi

  for PLUGIN in $PLUGINS; do
    PLUGIN="${PLUGIN//'"'}"
    # "'
    if [[ ! $(cat "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml) =~ ^.*"$PLUGIN".*$ ]]; then
      info   "$PLUGIN"

      cd "$DEPOT_MODULES"/"$PLUGIN"
      SOURCE=$(git config remote.upstream.url)
      echo "" >> "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
      echo "  $PLUGIN:" >> "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
      #echo "    name: $NAME" >> "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
      echo "    source: $SOURCE" >> "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
      select_plugin_branch "$PROJECT" "$PLUGIN"
      echo "    branch: $BRANCH_ELECTED" >> "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
      create_commit "$PROJECT add plugin $NAME"
      edit=1
      must_update_codebase=1
    fi
  done
  [ ! -z "$must_update_codebase" ] && [ "$must_update_codebase" -eq 1 ] && edit_plugins "$PROJECT"
  info End
}



function config_check () {

  info Start "$FUNCNAME"
  error=0
  [ -z "$1" ]&& error project param PROJECT missing && exit
  PROJECT="$1"
  [ "$DEBUG" = true ] && info "$PROJECT"
  # check validity .yml
  yq "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml >/dev/null  || (error invalid config file && exit 1)
  # check MOODLE_VERSION
  [[ "$MOODLE_VERSION" =~ ^[4-5]\.[0-5]\+?$|^[4-5]\.[0-5]\.[0-4]\+?$ ]] && info succes || (error "Invalid version $MOODLE_VERSION" && error=1)

  PLUGINS=$(yq '.plugins| keys | .[]' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  [ "$DEBUG" = true ] && info PLUGINS : "$PLUGINS"
  for PLUGIN in $PLUGINS; do
    info "Check plugin: $PLUGIN"
    # check if plugin exists in cache
    [[ ! -d "$DEPOT_MODULES"/"$PLUGIN" ]] && add_plugin_cache "$PROJECT" "$PLUGIN"
    [ "$DEBUG" = true ] && info "$PLUGIN"
    # check if plugin installed

  done

  [ "$error" -eq 0 ] && success Configuration file "$PROJECT" successful || error Please correct configuration file and retry

  info End
  return "$error"
}

function edit_plugins () {

  info Start
  error=0

  [ -z "$1" ]&& error project param PROJECT missing && exit
  PROJECT="$1"
  get_requested_state "$PROJECT" || exit 1
  local date_before date_after
  date_before=$(date -r "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  pluginsbefore=$(yq 'select(.plugins)|.plugins|keys' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  [ "$DEBUG" = true ] && info "Nb plugins avant maj : ${#pluginsbefore[@]}"

  ret=1
  while [ $ret -ne 0 ];
  do
    nano "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
    config_check "$PROJECT"
    ret=$?
    if [ $ret -ne 0 ]; then
      error syntax config file.Press any key and correct
      read -rn 1 c
    fi
  done

  date_after=$(date -r "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  if [ "$date_after" != "$date_before" ]; then
     [ "$DEBUG" = true ] && echo "il y a eu des maj..."
    # check validity .yml
    yq "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml >/dev/null || exit 1
    pluginsafter=$(yq 'select(.plugins) |.plugins| keys' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
    [ "$DEBUG" = true ] && info "Nb plugins apres maj : ${#pluginsafter[@]}"
    # on ne récupere que les plugins uniques donc uniquement ceux supprimés et non aussi ceux ajoutés !
    plugins_suppress=($(echo "${pluginsbefore[@]}" "${pluginsafter[@]}" "${pluginsafter[@]}" | tr ' ' '\n' | sort | uniq -u))
    [ "$DEBUG" = true ] && info "nb plugins à supprimmer: ${#plugins_suppress[@]}"
    for key in "${!plugins_suppress[@]}"; do
      # skip first entry -
      [[ ${plugins_suppress[$key]} == '-' ]] && continue
      echo "A supprimmer: $key ${plugins_suppress[$key]}"
      suppress_plugin "$PROJECT" "${plugins_suppress[$key]}"
    done
    create_commit "Update edit_plugins"
    must_update_codebase=1

  else
    [ "$DEBUG" = true ] && info "Pas de modification de la liste des plugins"
  fi
  if [ ! -z "$must_update_codebase" ] && [ "$must_update_codebase" -eq 1 ]; then
    update_codebase "$PROJECT"
    success Code base updated
  fi
  info End
}

function update_repo () {

  info Start
  error=0
  [ -z "$1" ]&& error project param PROJECT missing && exit
  PROJECT="$1"
  PLUGINS=$(yq '.plugins| keys | .[]' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)

  for PLUGIN in $PLUGINS; do
    [ "$DEBUG" = true ] && info check PLUGIN: "$PLUGINS"
    if [ -d "$DEPOT_MODULES"/"$PLUGIN" ]; then
      upgrade_plugin "$PROJECT" "$PLUGIN"
    else
      error "$PLUGIN" missing in local cache
      error=1
    fi
  done

  info End

}

function upgrade_plugin () {

  info Start
  error=0
  [ -z "$1" ]&& error project param PROJECT missing && exit
  PROJECT="$1"
  PLUGIN="$2"
  cd "$DEPOT_MODULES/$PLUGIN" || exit 1

  set_plugin "$PROJECT" "$PLUGIN"

  #git checkout --quiet $BRANCH_PLUGIN ||check_command error branch "$BRANCH_PLUGIN" not exists

  if [[ $PLUGIN_VERSION == null ]]; then

    SITEREMOTE=$(git remote | grep 'upstream')
    # check contains remote | grep 'upstream')
    [ $SITEREMOTE != 'upstream' ] && error=1 && error "$PLUGIN" remote upstream missing && exit 1

    git fetch upstream --quiet || check_command "error git fetch upstream"
    #git show-ref --verify --quiet refs/heads/"$BRANCH_UPSTREAM" ||check_command "error  git show-ref ref/heads/$BRANCH"

    # BRANCHREMOTE=$(git rev-parse --abbrev-ref "$BRANCH_UPSTREAM@{upstream}")
    #[ "$DEBUG" = true ]&& info "branche remote : $BRANCHREMOTE"
    git checkout --quiet $BRANCH_PLUGIN
    LOCAL=$(git rev-parse @)
    REMOTE=$(git rev-parse @{u})
    BASE=$(git merge-base @ @{u})

    [ "$DEBUG" = true ]&& info LOCAL:  " $LOCAL"
    [ "$DEBUG" = true ]&& info REMOTE: "$REMOTE"
    [ "$DEBUG" = true ]&& info BASE:   "  $BASE"

    if [ "$LOCAL" = "$REMOTE" ]; then
      success "$PLUGIN branche $BRANCH up-to-date with remote $BRANCHREMOTE"
    elif [ "$LOCAL" = "$BASE" ]; then
      warn "$BRANCH_UPSTREAM need to pull from remote $BRANCHREMOTE"
      # git fetch --quiet upstream
      # [ $? -ne 0 ] && error=1 &&  echo "$red error git fetch --quiet upstream $black" && exit 1
      if [ "$PLUGIN_UPGRADE_AUTO" == true ];then
        info "Mise à jour automatique du plugin $PLUGIN"
        git fetch --quiet upstream || check_command "error git checkout --quiet upstream"
        git checkout --quiet $BRANCH_UPSTREAM || check_command "error git checkout --quiet $BRANCH_UPSTREAM"
        git merge --quiet --ff-only upstream/$BRANCH_UPSTREAM || check_command "error git merge --quiet --ff-only upstream/$BRANCH_UPSTREAM"

        if [ "$LOCALDEV" != null ]; then
          EXISTS=$(git show-ref refs/heads/"$LOCALDEV")
          if [[ -z $EXISTS ]]; then
            git branch --quiet $LOCALDEV $BRANCH_UPSTREAM || check_command error git branch --quiet "$LOCALDEV" "$BRANCH_UPSTREAM"
          fi
          git checkout --quiet "$LOCALDEV" || check_command error git checkout "$LOCALDEV"
          git rebase --quiet "$BRANCH_UPSTREAM"
          if [ $? -eq 0 ]; then
            success "$LOCALDEV git rebase $BRANCH_UPSTREAM successfull"
          else
            error "error $LOCALDEV git rebase $BRANCH_UPSTREAM" && exit 1
          fi
        fi
      fi
    elif [ "$REMOTE" == "$BASE" ]; then
        warn "$BRANCH_UPSTREAM need to push to remote $BRANCHREMOTE"
    else
        error "$BRANCH_UPSTREAM diverged with remote $BRANCHREMOTE !!!" && exit 1
    fi
  else
    # cas pinned version
    # check contains

    if [[ 0 -eq $(git merge-base --is-ancestor "$PLUGIN_VERSION" HEAD) ]]; then
      success "$PLUGIN / $BRANCH_PLUGIN contains pinned version $PLUGIN_VERSION"
     else
      error=1
      error "$BRANCH_PLUGIN does not contains pinned version $PLUGIN_VERSION"
      exit
    fi

    git reset --hard "$PLUGIN_VERSION" || check_command error git reset --hard "$PLUGIN_VERSION"
  fi

  info End
  return "$error"
}


function set_plugin () {

  info Start "$FUNCNAME" "$1" "$2"
  error=0
  [ -z "$1" ]&& error param PROJECT missing && exit
  PROJECT="$1"
  #get_requested_state $PROJECT || exit 1
  [ -z "$2" ]&& error param PLUGIN missing && exit
  PLUGIN="$2"

  PLUGIN_BRANCH=$(yq .plugins."$PLUGIN".branch "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  PLUGIN_VERSION=$(yq .plugins."$PLUGIN".version "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  LOCALDEV=$(yq .plugins."$PLUGIN".localdev "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  #if LOCALDEV not defined set to null
  if [[ "$PLUGIN_VERSION" != null ]]; then
    BRANCH_PLUGIN="$PLUGIN_VERSION"
    [ "$DEBUG" = true ] && info "  BRANCH_PLUGIN: $BRANCH_PLUGIN  from PLUGIN_VERSION not null: $PLUGIN_VERSION"
  elif [[ "$LOCALDEV" != 'null' ]]; then
    BRANCH_PLUGIN="$LOCALDEV"
    [ "$DEBUG" = true ] && info "  BRANCH_PLUGIN: $BRANCH_PLUGIN from LOCALDEV not null: $LOCALDEV"
  else
    BRANCH_PLUGIN="$PLUGIN_BRANCH"
    [ "$DEBUG" = true ] && info "  BRANCH_PLUGIN: $BRANCH_PLUGIN from plugin's branch config: $BRANCH_UPSTREAM"
  fi
  if [ -d "$DEPOT_MODULES"/"$PLUGIN" ]; then
    cd "$DEPOT_MODULES"/"$PLUGIN" || exit 1
    if [[ $(git rev-parse --verify "$BRANCH_PLUGIN" ) ]];
    then
      git checkout "$BRANCH_PLUGIN" --quiet || check_command error git checkout "$BRANCH_PLUGIN"
      BRANCH_PLUGIN_SHA1=$(git rev-parse HEAD)
    else
      error=1
      return "$error"
    fi
  fi

  get_plugin_dir "$PLUGIN"

  [ "$DEBUG" = true ] && echo "  PLUGIN: $PLUGIN"
 #[ "$DEBUG" = true ] && echo "  BRANCH_UPSTREAM: $BRANCH_UPSTREAM"
  [ "$DEBUG" = true ] && echo "  LOCALDEV: $LOCALDEV"
  [ "$DEBUG" = true ] && echo "  BRANCH_PLUGIN: $BRANCH_PLUGIN"
  [ "$DEBUG" = true ] && echo "  BRANCH_PLUGIN_SHA1: $BRANCH_PLUGIN_SHA1"
  #[ "$DEBUG" = true ] && echo "  SOURCE: $SOURCE"
  [ "$DEBUG" = true ] && echo "  PLUGIN VERSION : $PLUGIN_VERSION"
  [ "$DEBUG" = true ] && echo "  DIR : $DIR"

  info End
  return "$error"
}

function install_plugin_project ()  {
  # install plugin (add or update)
  info Start

  error=0
  [ -z "$1" ]&& error project param PROJECT missing && exit
  [ -z "$2" ]&& error project param PLUGIN missing && exit
  PROJECT="$1"
  PLUGIN="$2"
  MSG="$3"
  # set plugin current
  set_plugin "$PROJECT" "$PLUGIN"
  cd "$MOODLE_SRC"
  git checkout "$PROJECT_BRANCH" --quiet || check_command git checkout "$PROJECT_BRANCH" --quiet
  if [ ! -d "$MOODLE_SRC"/"$DIR"/"$PLUGIN" ];
  then
    mkdir -p "$MOODLE_SRC"/"$DIR"/"$PLUGIN"
  fi
  rsync -a --delete "$DEPOT_MODULES"/"$PLUGIN"/* "$MOODLE_SRC"/"$DIR"/"$PLUGIN"/ # delete files in target if no longer exists in source
  echo "    branch = $BRANCH_PLUGIN" > "$MOODLE_SRC"/"$DIR"/"$PLUGIN"/.gitrepo
  echo "    commit = $BRANCH_PLUGIN_SHA1" >> "$MOODLE_SRC"/"$DIR"/"$PLUGIN"/.gitrepo
  git add . || check_command git add .
  git commit -m "$MSG" --quiet || check_command error git commit "$MSG"

  info End
}

function update_codebase () {

  info Start
  error=0
  [ -z "$1" ]&& error project param PROJECT missing && exit
  PROJECT="$1"
  #get_requested_state $PROJECT || exit 1
  # Etape 1 met à jour le depot local de plugin
  update_repo "$PROJECT"
  # Etape 2 met à jour la base de code

  cd "$MOODLE_SRC" || exit 1
  git checkout "$PROJECT_BRANCH" --quiet || (error git checkout "$PROJECT_BRANCH" && exit 1)

  PLUGINS=$(yq '.plugins| keys | .[]' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  [ "$DEBUG" = true ] && info PLUGINS "$PLUGINS"
  for PLUGIN in $PLUGINS;
  do
    set_plugin "$PROJECT" "$PLUGIN"
    info "Check: $PLUGIN branch: $BRANCH_PLUGIN"
    cd "$DEPOT_MODULES"/"$PLUGIN" || exit 1

  # BRANCH_PLUGIN branche à utiliser
  # = LOCALDEV  branch de dev local
  # = PLUGIN_VERSION quand il existe une version explicite du plugin la branche BRANCH_PLUGIN  est crée à ce commit lors de création ou de la mise à jour

    git checkout "$BRANCH_PLUGIN" --quiet || check_command git checkout "$BRANCH_PLUGIN"

    LOCAL=$(git rev-parse @)

    if [ -d "$MOODLE_SRC"/"$DIR"/"$PLUGIN" ]; then
    # module already installed
      cd "$MOODLE_SRC"/"$DIR"/"$PLUGIN" || exit 1
      #for sha1 complet -c11-50 | cut -c11-50
      #COMMIT=$(grep .gitrepo -e 'commit = ')
      [[ $(grep .gitrepo -e 'commit = ') =~ ^.*commit' = '([a-f0-9].*)$ ]] && COMMIT="${BASH_REMATCH[1]}"

      if [[ "$COMMIT" == "$LOCAL" ]]; then
        # MOD='OK'
        success "$PLUGIN est installe dans $MOODLE_SRC/$DIR/$PLUGIN et est à jour OK"
      else
        # MOD='UPD'
        warn "$PLUGIN est installe dans $MOODLE_SRC/$DIR/$PLUGIN mais n est pas à jour UPD"
        cd  "$MOODLE_SRC" || exit 1
        install_plugin_project "$PROJECT" "$PLUGIN" "Mise à jour de $PLUGIN"
        success "$PLUGIN mis à jour dans le répertoire $DIR"
      fi
    else
      # MOD='ADD'
      warn "$PLUGIN missing in $MOODLE_SRC/$DIR/$PLUGIN. ADD"
      info "$PLUGIN type: $TYPE path: $DIR branch: $BRANCH_PLUGIN"
      install_plugin_project "$PROJECT" "$PLUGIN" "Add $PLUGIN / $BRANCH_PLUGIN dans le répertoire $DIR"
      info "$PLUGIN / $BRANCH_PLUGIN ajouté dans le répertoire $DIR"
    fi

  done
 must_update_codebase=0
 info End

}

function release () {

info Start
error=0
[ -z "$1" ]&& error project param PROJECT missing && exit
PROJECT="$1"
info "Project $PROJECT Branch src Moodle: $PROJECT_BRANCH"

get_requested_state "$PROJECT" || exit 1

# $2 MSG for new release
info New release: "$NEWRELEASE"
NEWRELEASE="$PROJECT_BRANCH"-$(date +%Y.%m.%d@%Hh%M)
MSG="${2:-${NEWRELEASE}}"
#[ -z "${2}" ] && MSG="Release: $NEWRELEASE" || MSG="$2"
info MSG: "$MSG"
cd "$MOODLE_SRC" || exit 1
[ "$DEBUG" = true ] && info PROJECT_BRANCH: "$PROJECT_BRANCH"
git checkout "$PROJECT_BRANCH" --quiet || check_command git checkout "$PROJECT_BRANCH"
git commit --allow-empty -m "$MSG" || check_command git commit --allow-empty -m "$MSG"
git tag -a "$NEWRELEASE" -m "" || check_command git tag -a "$NEWRELEASE"

# create <PROJECT>.lock
project_lock "$PROJECT" "$NEWRELEASE"

cd "$MOODLE_SRC" || exit 1
git checkout "$PROJECT_BRANCH" --quiet || check_command git checkout "$PROJECT_BRANCH"
if [ $(git status --porcelain) ]; then
  error update pending dont remote update
else
  if [ ! -z "$MOODLE_UPDATE_ORIGIN" ]; then
    [ "$DEBUG" = true ] && info MOODLE_UPDATE_ORIGIN: "$MOODLE_UPDATE_ORIGIN"
    remote_origin_url=$(git config remote.origin.url)
    [ "$DEBUG" = true ] && info remote_origin_url: "$remote_origin_url"
    if [ ! -z "$remote_origin_url" ]; then
      if [ "$remote_origin_url" == "$MOODLE_UPDATE_ORIGIN" ]; then
        git push origin "$PROJECT_BRANCH" || check_command  git push origin "$PROJECT_BRANCH"
        success "$MOODLE_UPDATE_ORIGIN" successfully updated
      else
        error remote url has changed : "$remote_origin_url"
        error=1
        exit
      fi
    else
      # first time not configured
      info First time configure git add remote origin "$MOODLE_UPDATE_ORIGIN"
      git remote add origin "$MOODLE_UPDATE_ORIGIN" || check_command git remote add origin
      success remote add origin "$MOODLE_UPDATE_ORIGIN"
      # The option -u is for “set upstream”.
      #It configures the local branch to track the remote branch.
      # You don't need to use it more than once.
      git push -u origin "$PROJECT_BRANCH" || check_command git remote add origin "$remote_origin_url"
      success "$MOODLE_UPDATE_ORIGIN" updated
    fi
  fi
fi

info End
}
error=1
function project_lock () {

  info Start
  [ -z "$1" ]&& error param PROJECT missing && exit
  PROJECT="$1"
  [ -z "$2" ]&& error param NEWRELEASE missing && exit
  NEWRELEASE="$2"error=1
  error=0
  #get_requested_state "$PROJECT"  && echo conf $PROJECT successfully loaded || exit
  cd "$PROJECTS_PATH"/"$PROJECT" || exit 1
  # create "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".lock
  [ -f "$PROJECT".lock ] && rm "$PROJECT".lock
  cp "$PROJECT".yml "$PROJECT".lock

  cd "$MOODLE_SRC" || exit 1
  [ "$DEBUG" = true ] && info "PROJECT_BRANCH: $PROJECT_BRANCH"
  git checkout "$PROJECT_BRANCH" --quiet || check_command git checkout "$PROJECT_BRANCH" --quiet
  moodlebranch=$(git rev-parse --abbrev-ref HEAD) yq -i '.moodle.branch=strenv(moodlebranch)' $PROJECTS_PATH/$PROJECT/$PROJECT.lock
  moodlesha1=$(git rev-parse --short HEAD) yq -i '.moodle.version=strenv(moodlesha1)' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".lock
  [ "$DEBUG" = true ] && info moodlebranch: "$moodlebranch" moodlesha1: "$moodlesha1"

  PLUGINS=$(yq '.plugins| keys | .[]' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  [ "$DEBUG" = true ] && info PLUGINS "$PLUGINS"
  for PLUGIN in $PLUGINS; do
    #[[ "$PLUGIN" =~ ^\-.* ]] && continue
    [ "$DEBUG" = true ] &&info "Check plugin: $PLUGIN"
    get_plugin_dir "$PLUGIN"
    [[ $(cat "$MOODLE_SRC"/"$DIR"/"$PLUGIN"/.gitrepo | grep 'commit') =~ .*=.([0-9a-z]+) ]] && commit="${BASH_REMATCH[1]}"
    pathenv=".plugins.$PLUGIN" commit=${commit:0:7} yq -i 'eval(strenv(pathenv)).version = strenv(commit)' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".lock
  done

  create_commit "$NEWRELEASE"
  info End "$PROJECT"
  return $error
}

function suppress_plugin () {

  info Start
  error=0
  [ -z "$1" ]&& error project param PROJECT missing && exit
  PROJECT="$1"
  #get_requested_state $PROJECT || exit 1
  PLUGIN=$2

  info " Suppression du plugin ${PLUGIN}"

  if (whiptail --title "Boite de dialogue Oui / Non" --yesno "Suppression du plugin ${PLUGIN}" 10 60)
  then
    get_plugin_dir "$PLUGIN"
    if [ -d "$MOODLE_SRC"/"$DIR"/"$PLUGIN" ];
    then
      cd "$MOODLE_SRC" || exit 1
      git rm -r  "$MOODLE_SRC"/"$DIR"/"$PLUGIN" || check_command error git rm -r  "$MOODLE_SRC"/"$DIR"/"$PLUGIN"
      git commit -m "Suppress plugin $PLUGIN" --quiet || check_command git commit -m "Suppress plugin $PLUGIN"
      success "$PLUGIN deleted in codebase"
      echo -e "Press any key \n"
      read -rn 1 c
      sortie=0
    else
      warn "Plugin $PLUGIN not present nothing to do!"
    fi
  else
   info "Abandon !"
  fi

info End
}


