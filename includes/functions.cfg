#!/bin/bash

RED=$(tput setaf 1)
GREEN=$(tput setaf 2)
YELOW=$(tput setaf 3)
BLUE=$(tput setaf 14)
NC=$(tput sgr 0)

function info () { [ "$DEBUG" = false ] && echo "${BLUE}${FUNCNAME[1]} ${@}${NC}" || echo "${BLUE}${@} ${FUNCNAME[1]} line:${BASH_LINENO[0]}${NC}"; }
function warn () { [ "$DEBUG" = false ] && echo "${YELOW}${FUNCNAME[1]} ${@}${NC}" || echo "${YELOW}${@} ${FUNCNAME[1]} line:${BASH_LINENO[0]}${NC}"; }
function error () { [ "$DEBUG" = false ] && echo "${RED}${FUNCNAME[1]} ${@}${NC}" || echo "${RED}${@} ${FUNCNAME[1]} line:${BASH_LINENO[0]}${NC}"; }
function success () { [ "$DEBUG" = false ] && echo "${GREEN}${FUNCNAME[1]} ${@}${NC}" || echo "${GREEN}${@} ${FUNCNAME[1]} line:${BASH_LINENO[0]}${NC}"; }

function check_command () {
  if [[ $? -ne 0 ]]; then
    error "error execution ${FUNCNAME[1]} line:${BASH_LINENO[0]} command: ${@}"
    exit 1
  fi
}

function get_pluglist () {
  info Start
  error=0
  local diff now loadfile
  loadfile=false
  if [ -f "$SCRIPT_DIR"/pluglist.json ]; then
    now=$(date +'%Y-%m-%d')
    [[ $(stat "$SCRIPT_DIR"/pluglist.json | grep -E ^.*Modify:.*$) =~ ^.*Modify:.([0-9]{4}-[0-9]{2}-[0-9]{2}).*$ ]] && filedate="${BASH_REMATCH[1]}"
    let diff=$(date +%s -d "$now")-$(date +%s -d "$filedate")
    let diff="$diff"/86400
    [ "$DEBUG" = true ] && info Diff days: $diff
    [[ $diff -gt "$DIFF_DAYS" ]] && loadfile=true
  else
    [ "$DEBUG" = true ] && info load file "$SCRIPT_DIR"/pluglist.json: "$loadfile"
    loadfile=true
  fi

  [[ $"$loadfile" = true ]] && wget download.moodle.org/api/1.3/pluglist.php -O "$SCRIPT_DIR"/pluglist.json

  info End
  return "$error"
}

function create_file () {
  error=0
  [ -z "$1" ]&& error project param missing && exit
  if [ ! -f "$1" ];then
    touch "$1"
  fi
}

function create_dir () {
  error=0
  [ -z "$1" ]&& error project param missing && exit
  if [ ! -d "$1" ];then
    mkdir -p "$1"
  fi
}

function verif_pre_requis () {
  info Start
  local error
  error=0
  git --version || error=1
  jq --version || error=1
  yq --version || error=1
  [ "$error" -eq 0 ] && success Pre requis satisfied || error Pre requis not satisfied

  info End
  return "$error"
}
function create_env () {

  if [ ! -d "$PROJECTS_PATH" ]; then
    mkdir "$PROJECTS_PATH"
    cd "$PROJECTS_PATH" || exit 1
    git init -b main || check_command error git init -b main
    success Repository "$PROJECTS_PATH" created
  fi
}

function create_commit () {

  cd "$PROJECTS_PATH" || exit 1
  #git checkout main --quiet || check_command error git checkout main --quiet
  if [[ $(git status --porcelain) ]]; then
    if [ -z "$1" ]; then
      error commit message undefined
      exit
    else
      git add . || check_command error git add .
      git commit -m "$1" || check_command error git commit _m "$1"
    fi
  fi
}




function get_requested_state () {
  info Start "${FUNCNAME[0]}"  
  # get project requested state
  # PARAM IN  : $1 PROJECT
  #       OUT : PROJECT_BRANCH
  #             MOODLE_VERSION (from <project>.yml)
  #             MOODLE_MAJOR_VERSION
  #             MOODLE_BRANCH
  #             REQUEST_STATE (as commit if MOODLE_SRC exists)
  error=0
  
  [ -z "$1" ]&& error project param PROJECT missing && exit
  PROJECT="$1"
  PROJECT_BRANCH="$PROJECT"
  [ "$DEBUG" = true ] && info Start  "$PROJECT"/"$PROJECT_BRANCH"
  [ -f "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml ] || check_command "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml non défini
  yq . "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml >/dev/null || info syntax "$PROJECT" OK || {
    error Suntax error : "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
    exit 1
  }
  
  PIN_VERSION=$(yq .moodle.pin_version "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
    info PIN_VERSION: "$PIN_VERSION"    
  MOODLE_VERSION=$(yq .moodle.version "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  [[ "$MOODLE_VERSION" =~ ^[4-5]\.[0-5]\+?$|^[4-5]\.[0-5]\.[0-4]\+?$ ]] || error "Invalid Moodle version: $MOODLE_VERSION"
  MOODLE_MAJOR_VERSION="${MOODLE_VERSION:0:3}"
  # la branche de la version MOODLE majeure est obtenue par moodle-version.yml
  MOODLE_BRANCH=$(yq '."'${MOODLE_MAJOR_VERSION}'".branch' "$RACINE"/moodle-version.yml)
  if [[ "$MOODLE_BRANCH" != null  ]]; then
    [ "$DEBUG" = true ] && info "Moodle: $MOODLE_MAJOR_VERSION Branch: $MOODLE_BRANCH"
  else
    error "Version ${MOODLE_MAJOR_VERSION} unknown"
    exit 1
  fi
  info End

  REQUEST_STATE=''  

  if [[ "$PIN_VERSION" != null ]];
  then
    REQUEST_STATE="$PIN_VERSION"
  elif [[ -d "$MOODLE_SRC" ]];
  then
    cd "$MOODLE_SRC" || exit 1
    if [[ "$MOODLE_VERSION" =~ ^[4-5]\.[0-5]$ ]]
    then
    #for example 4.5
      [ "$DEBUG" = true ] && info "Latest available release $MOODLE_VERSION"
      echo "latest available release $MOODLE_VERSION"      
      tags=$(git tag -l v"$MOODLE_VERSION"?)
      [ -z "$tags" ] && error Tags are missing!  && exit 1
      info "$tags"
      REQUEST_STATE=v${tags##*v}
      
    elif [[ "$MOODLE_VERSION" =~ ^[4-5]\.[0-5]\+$ ]]
    then
      #for example 4.5+
      [ "$DEBUG" = true ] && info "latest available release $MOODLE_VERSION with fixes"
      git checkout "$MOODLE_BRANCH" --quiet || check_command error git checkout "$MOODLE_BRANCH"
      REQUEST_STATE="$MOODLE_BRANCH"
      
    elif [[ "$MOODLE_VERSION" =~ ^[4-5]\.[0-5]\.[0-4]$ ]]
    then
      #for example 4.5.1
      [ "$DEBUG" = true ] && info "Specific release in $MOODLE_VERSION"
      [[ $(git tag -l "v${MOODLE_VERSION}") ]] || (error "Release $MOODLE_VERSION not exists" && exit 1)
      REQUEST_STATE=v$MOODLE_VERSION
    elif [[ "$MOODLE_info EndVERSION" =~ ^[4-5]\.[0-5]\.[0-4]?\+$ ]]
    then
      error specific release with fixes in "$MOODLE_VERSION" not yet supported...&& error=1
    else
      error Valeur incorrecte "$MOODLE_VERSION" && error=1
    fi
    git checkout "$REQUEST_STATE" --quiet || check_command error git checkout "$REQUEST_STATE"
    CURRENT_STATE=$(git rev-parse HEAD)
  else
  # current when no MOODLE repo
    warn Moodle source not present
  fi
    [ "$DEBUG" = true ] && info REQUEST_STATE: "$REQUEST_STATE"    
     
       
  [ "$DEBUG" = true ] && info PROJECT_BRANCH: "$PROJECT_BRANCH"
  [ "$DEBUG" = true ] && info MOODLE_VERSION: "$MOODLE_VERSION"
  [ "$DEBUG" = true ] && info MOODLE_MAJOR_VERSION: "$MOODLE_MAJOR_VERSION"
  [ "$DEBUG" = true ] && info MOODLE_BRANCH: "$MOODLE_BRANCH"
  [ "$DEBUG" = true ] && info REQUEST_STATE: "$REQUEST_STATE"
  [ "$DEBUG" = true ] && info CURRENT_STATE: "${CURRENT_STATE:-}"

  [ "$DEBUG" = true ] && info End
  
  info End
  return "$error"
  
}

function get_current_state () {
  info Start "${FUNCNAME[0]}"
  # PARAM IN  : PROJECT
  #       OUT : CURRENT_STATE branch, tag, or sha1
  #             CURRENT_SHA1 (sha1)
  # change if MOODLE_VERSION change or MOODLE source changed

  error=0
  [ -z "$1" ]&& error param PROJECT missing && exit
  # refresh MOODLE_VERSION
  PROJECT="$1"
  get_requested_state "$PROJECT"
  [ "$DEBUG" = true ] && info MOODLE_VERSION: "$MOODLE_VERSION" "$PIN_VERSION"
  cd "$MOODLE_SRC" || exit 1
  if [[ "$PIN_VERSION" != null ]];
  then
    if [[ $(git branch --contains "$PIN_VERSION") =~ ^.*(MOODLE_..._STABLE) ]];
    then
      MOODLE_BRANCH=$(yq '."'${MOODLE_MAJOR_VERSION}'".branch' "$RACINE"/moodle-version.yml)
      [[ "$MOODLE_BRANCH" != "${BASH_REMATCH[1]}" ]] && warn MOODLE_BRANCH <> "$MOODLE_BRANCH != ${BASH_REMATCH[1]}"     
      info "$PIN_VERSION" in "$MOODLE_BRANCH"
      git checkout "$PIN_VERSION" --quiet
      CURRENT_STATE="info End$PIN_VERSION"
    else
      info "$PIN_VERSION" branch not found
      error=1
    fi
  fi

  git checkout "$CURRENT_STATE" --quiet || check_command error git checkout "$CURRENT_STATE"
  CURRENT_SHA1=$(git rev-parse HEAD)
  
  [ "$DEBUG" = true ] && info "PIN_VERSION: $PIN_VERSION"
  [ "$DEBUG" = true ] && info "CURRENT_STATE: $CURRENT_STATE"
  [ "$DEBUG" = true ] && info "CURRENT_SHA1: ${CURRENT_SHA1:0:7}"
  
  info End
  return "$error"
}

function set_plugin_current () {
  info Start "${FUNCNAME[0]}"
  # IN:  $PROJECT
  #      $PLUGIN
  # OUT: $PLUGIN_CURRENT
  #      $PLUGIN_CURRENT_SHA1
  # PLUGIN must be present in cache
  info Start "${FUNCNAME[0]}"

  error=0
  
  PROJECT="$1"
  [ -f "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml ] || exit 1
  PLUGIN="$2"
  [ -d "$DEPOT_MODULES/$PLUGIN" ] || exit 1

  PLUGIN_BRANCH=$(yq .plugins."$PLUGIN".branch  "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  PLUGIN_VERSION=$(yq .plugins."$PLUGIN".version "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  LOCALDEV=$(yq .plugins."$PLUGIN".localdev "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  
  get_plugin_dir "$PLUGIN"
  [[ -n "$PLUGIN_BRANCH" ]]&& error=1 && error "$PLUGIN" branch "$PLUGIN_BRANCH" not defined && exit
  if [[ "$PLUGIN_VERSION" != null ]];
  then
    PLUGIN_CURRENT="$PLUGIN_VERSION"
  elif [[ "$LOCALDEV" != null ]]
  then
    PLUGIN_CURRENT="$LOCALDEV"
  else
    PLUGIN_CURRENT="$PLUGIN_BRANCH"
  fi
  
  if [[ $(git checkout "$PLUGIN_CURRENT" --quiet) = '' ]];
  then
    success "$PLUGIN_CURRENT"
    PLUGIN_CURRENT_SHA1=$(git rev-parse HEAD)
  else  
    error=1 
    error "$PLUGIN_CURRENT"
  fi
  [ "$DEBUG" = true ] && info "  PLUGIN: $PLUGIN"
  [ "$DEBUG" = true ] && info "  DIR : $DIR"
  [ "$DEBUG" = true ] && info "  LOCALDEV: $LOCALDEV"
  [ "$DEBUG" = true ] && info "  BRANCH_PLUGIN: ${BRANCH_PLUGIN:-}"
  [ "$DEBUG" = true ] && info "  PLUGIN VERSION : ${PLUGIN_VERSION:-}"
  [ "$DEBUG" = true ] && info "  PLUGIN_CURRENT: $PLUGIN_CURRENT"
  [ "$DEBUG" = true ] && info "  PLUGIN_CURRENT_SHA1: $PLUGIN_CURRENT_SHA1"

  info End
  return "$error"
}

function select_plugin_branch () {
  info Start "${FUNCNAME[0]}"
  # IN:  $PROJECT
  #      $PLUGIN
  # OUT: $PLUGIN_BRANCH  best effort
  # PLUGIN must be present in cache
  info Start
  error=0
  
  PROJECT="$1"
  [ -f "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml ] || exit 1
  PLUGIN="$2"
  [ -d "$DEPOT_MODULES/$PLUGIN" ] || exit 1
  
  #PLUGIN_BRANCH=$(yq .plugins."$PLUGIN".branch  "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  PLUGIN_VERSION=$(yq .plugins."$PLUGIN".version "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  LOCALDEV=$(yq .plugins."$PLUGIN".localdev "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml)
  
  cd "$DEPOT_MODULES"/"$PLUGIN" || exit 1
  
  BRANCH_ELECTED=''
  
  if [[ $(git branch -r | grep -E "^  upstream\/$MOODLE_BRANCH$") ]];
  then
    BRANCH_ELECTED="$MOODLE_BRANCH"
    if [[ ! $(git branch) =~ $BRANCH_ELECTED ]];
    then
      git checkout -b "$BRANCH_ELECTED" upstream/"$BRANCH_ELECTED"
      fi
      info "Bingo Moodle branch $MOODLE_BRANCH match !"      
  else
    branch_stable_remote=$(git branch -r | grep -E "^  upstream\/MOODLE_[0-9]{2,3}_STABLE$" | sort -rn | head -n 1)
    info "default best highest remote branch $branch_stable_remote"
    if [[ "$branch_stable_remote" ]]; then
      if [[ $branch_stable_remote =~ ^.*upstream\/(.*)$ ]]; then
        BRANCH_ELECTED="${BASH_REMATCH[1]}"
        if [[ ! $(git branch) =~ $BRANCH_ELECTED ]];
        then
          git checkout -b "$BRANCH_ELECTED" upstream/"$BRANCH_ELECTED"
        fi        
      fi        
    fi
  fi
  
  if [[ -z "$BRANCH_ELECTED" ]];
  then
    if [[ $(git rev-parse --verify upstream/master 2>/dev/null) ]];
    then      
      BRANCH_ELECTED=master
      if [[ ! $(git branch) =~ $BRANCH_ELECTED ]];
      then
        git checkout -b "$BRANCH_ELECTED" upstream/"$BRANCH_ELECTED"
      fi
      info Branch remote master selected
    fi  
  else
    if [[ $(git rev-parse --verify upstream/main 2>/dev/null) ]];
    then
      BRANCH_ELECTED=main
      if [[ ! $(git branch) =~ $BRANCH_ELECTED ]];
      then
        git checkout -b "$BRANCH_ELECTED" upstream/"$BRANCH_ELECTED"
      fi
      info Branch remote main selected
    fi
  fi

  if [[ -n "$BRANCH_ELECTED" ]];
  then
    # store in project file
     pathenv=".plugins.$PLUGIN" branche="$BRANCH_ELECTED" yq -i 'eval(strenv(pathenv).branch) = strenv(branche)' "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
     success  "$PLUGIN" branch updated "$BRANCH_ELECTED"
  else
    error=1
    error "$BRANCH_ELECTED" not defined
  fi
  
  info End
  return "$error"
}

function new_project () {

  info Start
  # Initialisation signal erreur
  error=0
  [ -z "$1" ]&& error project param PROJECT missing && exit
  PROJECT="$1"

  if [[ ! -d "$PROJECTS_PATH"/"$PROJECT" ]];
  then

    info Creation environment "$PROJECTS_PATH"/"$PROJECT"

    #create_dirs
    create_dir "$DEPOT_MODULES"
    create_dir "$PROJECTS_PATH"/"$PROJECT"
    create_dir "$PROJECTS_PATH"/"$PROJECT"/env
    create_file "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml

    echo "# Configuration de $PROJECT" >>  "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
    echo "# generatedlist_plugin_cache by $USER $DATE_DU_JOUR" >> "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml

    MOODLE_VERSION=$(whiptail --inputbox "What is your Moodle version?" 8 39 --title "Conf $PROJECT" "$MOODLE_VERSION" 3>&1 1>&2 2>&3)
    [[ "$MOODLE_VERSION" =~ ^[4-5]\.[0-5]\+?$|^[4-5]\.[0-5]\.[0-4]\+?$ ]] && info succes || error "Invalid version $MOODLE_VERSION"
    echo "moodle:" >> "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
    echo "  version: $MOODLE_VERSION" >> "$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
    get_requested_state "$PROJECT"

    echo "" >>"$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml
    echo "plugins:" >>"$PROJECTS_PATH"/"$PROJECT"/"$PROJECT".yml

    create_dir "$PROJECTS_PATH"/"$PROJECT"/env/dev
    create_file "$PROJECTS_PATH"/"$PROJECT"/env/dev/config.php
    create_commit "Project $PROJECT created"
    create_project_repo "$PROJECT"
    success "Project environment $PROJECT created"
  else
    warn "PROJECT" already exists
  fi


  info End
}

